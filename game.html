<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA BRAWL 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; cursor: crosshair; }
        canvas { display: block; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* Crosshair */
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; z-index: 20;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.9);
        }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        #crosshair .dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; border-radius: 50%; background: #ff4444;
        }

        /* Health Bar */
        #health-container {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 300px; z-index: 20;
        }
        #health-bg {
            width: 100%; height: 20px; background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden;
        }
        #health-bar {
            height: 100%; width: 100%; background: linear-gradient(90deg, #ff0040, #ff4444, #00ff88);
            border-radius: 8px; transition: width 0.3s ease;
        }
        #health-text {
            text-align: center; color: white; font-size: 12px; margin-top: 4px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* Score */
        #score {
            position: fixed; top: 20px; right: 30px; color: white;
            font-size: 28px; font-weight: bold; z-index: 20;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
        }

        /* Kill Feed */
        #killfeed {
            position: fixed; top: 20px; left: 20px; z-index: 20;
            display: flex; flex-direction: column; gap: 4px;
        }
        .kill-msg {
            color: white; font-size: 14px; padding: 4px 10px;
            background: rgba(0,0,0,0.5); border-radius: 4px;
            animation: fadeOut 3s forwards; border-left: 3px solid #ff4444;
        }
        @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

        /* Ammo */
        #ammo {
            position: fixed; bottom: 40px; right: 30px; color: white;
            font-size: 22px; font-weight: bold; z-index: 20;
            text-shadow: 0 0 15px rgba(255, 200, 0, 0.8);
        }

        /* Super Ability */
        #super-container {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 20;
        }
        #super-bar-bg {
            width: 200px; height: 12px; background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,200,0,0.5); border-radius: 6px; overflow: hidden;
        }
        #super-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ff8800, #ffdd00);
            border-radius: 4px; transition: width 0.3s ease;
        }
        #super-text {
            text-align: center; color: #ffdd00; font-size: 11px; margin-top: 2px;
            text-shadow: 0 0 10px rgba(255,200,0,0.6);
        }

        /* Minimap */
        #minimap {
            position: fixed; bottom: 20px; left: 20px; z-index: 20;
            width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5); overflow: hidden;
        }
        #minimap-canvas { width: 100%; height: 100%; border-radius: 50%; }

        /* Damage indicator */
        #damage-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; opacity: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
            transition: opacity 0.1s ease;
        }

        /* Start Screen */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        #start-screen h1 {
            font-size: 72px; color: white; margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(0,200,255,0.8), 0 0 80px rgba(255,0,100,0.4);
            letter-spacing: 8px;
        }
        #start-screen .subtitle {
            color: rgba(255,255,255,0.6); font-size: 18px; margin-bottom: 50px;
            letter-spacing: 4px;
        }
        #start-btn {
            padding: 18px 60px; font-size: 22px; font-weight: bold;
            background: linear-gradient(135deg, #ff0050, #ff4400);
            color: white; border: none; border-radius: 12px; cursor: pointer;
            letter-spacing: 3px; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255,0,80,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: all;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255,0,80,0.8);
        }
        .controls-info {
            margin-top: 40px; color: rgba(255,255,255,0.4); font-size: 13px;
            text-align: center; line-height: 2;
        }

        /* Game Over */
        #gameover-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        #gameover-screen h1 {
            font-size: 64px; color: #ff0040;
            text-shadow: 0 0 40px rgba(255,0,64,0.8); margin-bottom: 20px;
        }
        #final-score { color: white; font-size: 28px; margin-bottom: 40px; }
        #restart-btn {
            padding: 15px 50px; font-size: 20px; font-weight: bold;
            background: linear-gradient(135deg, #00cc88, #00aaff);
            color: white; border: none; border-radius: 10px; cursor: pointer;
            letter-spacing: 2px; pointer-events: all;
            box-shadow: 0 0 30px rgba(0,200,150,0.5);
        }

        /* Wave Banner */
        #wave-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 25; opacity: 0; pointer-events: none;
            font-size: 48px; font-weight: bold; color: white;
            text-shadow: 0 0 30px rgba(0,200,255,0.8);
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="crosshair"><div class="dot"></div></div>
    <div id="damage-overlay"></div>

    <div id="hud">
        <div id="score">SCORE: 0</div>
        <div id="killfeed"></div>
        <div id="ammo">AMMO: 3 / 3</div>
        <div id="super-container">
            <div id="super-bar-bg"><div id="super-bar"></div></div>
            <div id="super-text">SUPER [Q]</div>
        </div>
        <div id="health-container">
            <div id="health-bg"><div id="health-bar"></div></div>
            <div id="health-text">HP 100 / 100</div>
        </div>
        <div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>
    </div>

    <div id="wave-banner"></div>

    <div id="start-screen">
        <h1>ARENA BRAWL 3D</h1>
        <div class="subtitle">BATTLE ROYALE</div>
        <button id="start-btn">SPIELEN</button>
        <div class="controls-info">
            WASD — Bewegen &nbsp;|&nbsp; MAUS — Zielen &nbsp;|&nbsp; LINKSKLICK — Schie&szlig;en<br>
            LEERTASTE — Ausweichen &nbsp;|&nbsp; Q — Super-Attacke &nbsp;|&nbsp; SHIFT — Sprint
        </div>
    </div>

    <div id="gameover-screen">
        <h1>GAME OVER</h1>
        <div id="final-score">Score: 0</div>
        <button id="restart-btn">NOCHMAL SPIELEN</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "three/addons/": "./node_modules/three/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="/src/game/main.js"></script>
</body>
</html>
