<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 2D - Top Down City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 10;
        }
        #wanted {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 24px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #mission-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
        }
        #start-screen h1 {
            font-size: 72px;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #ff6600, 6px 6px 0 #cc0000;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }
        #start-screen h2 {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 40px;
            font-weight: normal;
        }
        #start-screen .start-btn {
            padding: 15px 50px;
            font-size: 24px;
            background: #ffcc00;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
        }
        #start-screen .start-btn:hover { background: #ff9900; }
        #minimap {
            position: absolute;
            bottom: 10px;
            left: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 10;
            pointer-events: none;
        }
        #money-popup {
            position: absolute;
            color: #00ff00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: all 0.5s;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>GTA 2D</h1>
        <h2>TOP DOWN CITY</h2>
        <button class="start-btn" onclick="startGame()">SPIELEN</button>
        <p style="margin-top:30px;color:#666;font-size:13px;">
            WASD/Pfeiltasten = Bewegen &bull; F = Auto ein/aussteigen &bull; SPACE = Bremsen/Handbremse<br>
            Mausklick = Schie&szlig;en &bull; E = Interagieren &bull; SHIFT = Sprinten
        </p>
    </div>
    <div id="ui">
        <div id="health-bar"></div>
        <div id="money"></div>
        <div id="speed"></div>
    </div>
    <div id="wanted"></div>
    <div id="controls">WASD = Bewegen | F = Auto ein/aussteigen | SPACE = Bremsen | Maus = Schie&szlig;en | E = Interagieren | SHIFT = Sprint</div>
    <div id="mission-text"></div>
    <div id="money-popup"></div>
    <canvas id="game"></canvas>
    <canvas id="minimap" width="160" height="160"></canvas>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/city.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/missions.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
